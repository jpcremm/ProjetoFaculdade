<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta</title>
  <link rel="stylesheet" href="cadastro.css" />
</head>
<body>

  <a href="../login/login.html" class="back-link" aria-label="Voltar para a página de login">
    <span aria-hidden="true">←</span> Voltar para login
  </a>

  <main class="page-wrapper" role="main">
    <section class="auth-card" aria-labelledby="form-title">

      <header class="auth-card__header">
        <h1 id="form-title" class="auth-card__title">Criar conta</h1>
        <p class="auth-card__subtitle">Preencha seus dados para começar</p>
      </header>

      <form class="auth-form" id="signup-form" novalidate>

        <fieldset class="auth-form__group">
          <label for="full-name" class="auth-form__label">Nome completo</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="full-name"
              name="full-name"
              class="auth-form__input"
              placeholder="Seu nome"
              autocomplete="name"
              required
              aria-required="true"
              aria-describedby="full-name-error"
            />
          </div>
          <p class="auth-form__error" id="full-name-error" role="alert" aria-live="polite"></p>
        </fieldset>

        <fieldset class="auth-form__group">
          <label for="email" class="auth-form__label">E-mail</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              class="auth-form__input"
              placeholder="seu@email.com"
              autocomplete="email"
              required
              aria-required="true"
              aria-describedby="email-error"
            />
          </div>
          <p class="auth-form__error" id="email-error" role="alert" aria-live="polite"></p>
        </fieldset>

        <fieldset class="auth-form__group">
          <label for="password" class="auth-form__label">Senha</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              class="auth-form__input"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              minlength="6"
              required
              aria-required="true"
              aria-describedby="password-error"
            />
            <button type="button" class="toggle-password" aria-label="Mostrar senha" data-target="password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="auth-form__error" id="password-error" role="alert" aria-live="polite"></p>
        </fieldset>

        <fieldset class="auth-form__group">
          <label for="confirm-password" class="auth-form__label">Confirmar senha</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              class="auth-form__input"
              placeholder="Digite a senha novamente"
              autocomplete="new-password"
              required
              aria-required="true"
              aria-describedby="confirm-password-error"
            />
            <button type="button" class="toggle-password" aria-label="Mostrar confirmação de senha" data-target="confirm-password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="auth-form__error" id="confirm-password-error" role="alert" aria-live="polite"></p>
        </fieldset>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-text">Criar conta</span>
          <span class="btn-spinner" aria-hidden="true" hidden></span>
        </button>

      </form>

      <footer class="auth-card__footer">
        <p>Já tem uma conta? <a href="../login/login.html" class="link-highlight">Fazer login</a></p>
      </footer>

    </section>
  </main>

  <script src="cadastro.js"></script>
</body>
</html>
