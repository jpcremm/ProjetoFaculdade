<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entregas</title>
  <link rel="stylesheet" href="entregador.css" />
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <h1>Entregas</h1>
      <p id="active-label">0 entregas ativas</p>
    </div>
    <div class="topbar-right">
      <div class="stat-col">
        <div class="stat-num green" id="count-coletar">0</div>
        <div class="stat-label">Para coletar</div>
      </div>
      <div class="stat-col">
        <div class="stat-num purple" id="count-rota">0</div>
        <div class="stat-label">Em rota</div>
      </div>
      <div class="stat-col">
        <div class="stat-num gray" id="count-entregues">0</div>
        <div class="stat-label">Entregues</div>
      </div>
      <button class="logout-btn" title="Sair" data-action="logout">⇥</button>
    </div>
  </div>

  <!-- Abas -->
  <div class="tabs">
    <button class="tab active" data-tab="ativas">Entregas ativas</button>
    <button class="tab" data-tab="realizadas">Realizadas hoje <span class="tab-badge" id="tab-badge">0</span></button>
  </div>

  <!-- Painel: Ativas -->
  <div id="painel-ativas" class="painel">
    <div class="content">

      <!-- Coluna: Prontos para retirada -->
      <div>
        <div class="section-title">
          <span>📦</span>
          <span id="prontos-title">Prontos para retirada (0)</span>
        </div>

        <div id="prontos-list">

        </div>
        <div class="empty-msg" id="prontos-empty">Nenhum pedido pronto para retirada.</div>
      </div>

      <!-- Coluna: Em rota -->
      <div>
        <div class="section-title">
          <span>✈</span>
          Em rota (0)
        </div>

        <div id="rota-list">

        </div>
        <div class="empty-msg" id="rota-empty">Nenhuma entrega em rota.</div>
      </div>

    </div>
  </div>

  <!-- Painel: Realizadas -->
  <div id="painel-realizadas" class="painel hidden">
    <div class="realizadas-header">
      <div class="realizadas-resumo">
        <div class="resumo-item">
          <span class="resumo-valor" id="resumo-total">0</span>
          <span class="resumo-label">Entregas</span>
        </div>
        <div class="resumo-divider"></div>
        <div class="resumo-item">
          <span class="resumo-valor green" id="resumo-valor">R$ 0,00</span>
          <span class="resumo-label">Total recebido</span>
        </div>
      </div>
    </div>

    <div id="realizadas-list"></div>
    <div class="empty-msg" id="realizadas-empty" style="display:block; text-align:center; padding: 48px 0;">
      Nenhuma entrega realizada ainda hoje.
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <!-- Configuração e serviços -->
  <script src="../src/firebase/firebase-config.js"></script>
  <script src="../src/firebase/auth-service.js"></script>
  <script src="../src/firebase/db-service.js"></script>
  <script src="../src/utils/validators.js"></script>
  <script src="entregador.js"></script>
</body>
</html>
