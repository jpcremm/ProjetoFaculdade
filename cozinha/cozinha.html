<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cozinha</title>
  <link rel="stylesheet" href="cozinha.css" />
</head>
<body>

  <!-- ── Top Bar ── -->
  <header class="topbar">
    <hgroup class="topbar-left">
      <h1>Cozinha</h1>
      <p id="active-label">3 pedidos em andamento</p>
    </hgroup>

    <nav class="topbar-right" aria-label="Controles da cozinha">
      <button class="pico-btn" id="pico-btn" data-action="toggle-pico" aria-pressed="false">
        <span class="pico-icon" aria-hidden="true">⚡</span>
        <span class="pico-text">
          <small class="pico-mode" id="pico-mode">Modo Normal</small>
          <strong class="pico-label" id="pico-label">Ativar Pico</strong>
        </span>
      </button>

      <dl class="stats-list">
        <div class="stat-col">
          <dd class="stat-num orange" id="count-pendentes">1</dd>
          <dt class="stat-label">Pendentes</dt>
        </div>
        <div class="stat-col">
          <dd class="stat-num blue" id="count-preparando">2</dd>
          <dt class="stat-label">Preparando</dt>
        </div>
        <div class="stat-col">
          <dd class="stat-num green" id="count-prontos">1</dd>
          <dt class="stat-label">Prontos</dt>
        </div>
      </dl>

      <button class="logout-btn" title="Sair" aria-label="Sair" data-action="logout">⇥</button>
    </nav>
  </header>

  <!-- ── Banner Modo Pico ── -->
  <aside class="pico-banner hidden" id="pico-banner" role="alert" aria-live="polite">
    <span class="pico-dot" aria-hidden="true"></span>
    Modo Pico ativado — O cardápio foi reorganizado para priorizar pratos rápidos e operacionais
  </aside>

  <!-- ── Colunas de pedidos ── -->
  <main class="content">

    <!-- Pendentes -->
    <section aria-labelledby="title-pendentes">
      <h2 class="section-title orange" id="title-pendentes">
        <span aria-hidden="true">🕐</span> Pendentes (<span class="col-count">1</span>)
      </h2>

      <ol class="card-list" id="list-pendentes" aria-label="Pedidos pendentes">

      </ol>
      <p class="empty-msg" id="empty-pendentes" role="status">Nenhum pedido pendente.</p>
    </section>

    <!-- Preparando -->
    <section aria-labelledby="title-preparando">
      <h2 class="section-title blue" id="title-preparando">
        <span aria-hidden="true">📦</span> Preparando (<span class="col-count">2</span>)
      </h2>

      <ol class="card-list" id="list-preparando" aria-label="Pedidos em preparo">
        
      </ol>
      <p class="empty-msg" id="empty-preparando" role="status">Nenhum pedido em preparo.</p>
    </section>

    <!-- Prontos -->
    <section aria-labelledby="title-prontos">
      <h2 class="section-title green" id="title-prontos">
        <span aria-hidden="true">✅</span> Prontos (<span class="col-count">1</span>)
      </h2>

      <ol class="card-list" id="list-prontos" aria-label="Pedidos prontos">
      
      </ol>
      <p class="empty-msg" id="empty-prontos" role="status">Nenhum pedido pronto.</p>
    </section>

  </main>

  <output class="toast" id="toast" role="status" aria-live="polite"></output>

  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <!-- Configuração e serviços -->
  <script src="../src/firebase/firebase-config.js"></script>
  <script src="../src/firebase/auth-service.js"></script>
  <script src="../src/firebase/db-service.js"></script>
  <script src="../src/utils/validators.js"></script>
  <script src="cozinha.js"></script>
</body>
</html>
