<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Brain Delivery – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="brand">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24">
        <path d="M6 2h12a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
        <path d="M9 7h6M9 12h6M9 17h4"/>
      </svg>
    </div>
    <span class="brand-name">Profit Brain Delivery</span>
    <span class="brand-sub">Dark Kitchen • Delivery First</span>
  </div>

  <div class="card">
    <div class="card-title">Faça seu pedido</div>

    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        </span>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn-primary" id="btnLogin">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Entrar e fazer pedido
    </button>

    <div class="links">
      <a href="#">Criar conta</a>
      <span>•</span>
      <a href="#">Esqueci minha senha</a>
    </div>
  </div>

  <div class="staff-card">
    <span class="staff-question">Você faz parte da staff do restaurante?</span>
    <button class="btn-staff" id="btnStaff">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Fazer login como staff
    </button>
  </div>

  <footer>Sistema de pedidos e gestão de dark kitchen</footer>

  <script src="login.js"></script>
</body>
</html>
